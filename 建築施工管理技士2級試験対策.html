<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2級建築施工管理技士 学習アプリ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Bebas+Neue&display=swap');

  :root {
    --ink: #1a1d1a;
    --paper: #f4f0e6;
    --paper-dark: #e8e2d2;
    --accent: #c8462e;
    --accent-dark: #9e3422;
    --green: #3d6b4a;
    --green-light: #5a8a67;
    --gold: #c9a44a;
    --line: #c5bda6;
    --shadow: rgba(26, 29, 26, 0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body {
    min-height: 100vh;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(197,189,166,0.25) 39px, rgba(197,189,166,0.25) 40px);
    padding: 0 16px 60px;
  }

  .wrap {
    max-width: 680px;
    margin: 0 auto;
  }

  /* ---- Header ---- */
  header {
    padding: 36px 0 20px;
    border-bottom: 3px solid var(--ink);
    margin-bottom: 4px;
    position: relative;
  }
  header::after {
    content: "";
    position: absolute;
    bottom: -7px; left: 0; right: 0;
    height: 1px;
    background: var(--ink);
  }
  .kicker {
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 0.22em;
    font-size: 14px;
    color: var(--accent);
    margin-bottom: 4px;
  }
  h1 {
    font-size: 30px;
    font-weight: 900;
    letter-spacing: 0.02em;
    line-height: 1.2;
  }
  h1 .lvl {
    display: inline-block;
    background: var(--ink);
    color: var(--paper);
    font-size: 18px;
    padding: 2px 10px;
    margin-right: 6px;
    transform: translateY(-3px);
  }
  .sub {
    margin-top: 8px;
    font-size: 13px;
    color: #5a5648;
    letter-spacing: 0.04em;
  }

  /* ---- Cards / panels ---- */
  .panel {
    background: var(--paper);
    border: 2px solid var(--ink);
    box-shadow: 6px 6px 0 var(--shadow);
    margin-top: 28px;
    padding: 24px;
  }

  /* ---- Start screen ---- */
  .start-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .start-title::before {
    content: "";
    width: 14px; height: 14px;
    background: var(--accent);
    transform: rotate(45deg);
  }

  .cat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .cat-btn {
    background: var(--paper-dark);
    border: 2px solid var(--ink);
    padding: 16px 12px;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    transition: transform 0.12s, background 0.12s, box-shadow 0.12s;
    position: relative;
  }
  .cat-btn:hover {
    transform: translate(-2px,-2px);
    box-shadow: 4px 4px 0 var(--shadow);
    background: var(--paper);
  }
  .cat-btn .cat-no {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--accent);
    line-height: 1;
  }
  .cat-btn .cat-name {
    font-size: 15px;
    font-weight: 700;
    margin-top: 2px;
  }
  .cat-btn .cat-count {
    font-size: 11px;
    color: #6b6757;
    margin-top: 4px;
  }
  .cat-btn.all {
    grid-column: span 2;
    background: var(--green);
    color: var(--paper);
  }
  .cat-btn.all .cat-no,
  .cat-btn.all .cat-count { color: var(--gold); }
  .cat-btn.all:hover { background: var(--green-light); }

  .cat-btn.challenge {
    grid-column: span 2;
    background: var(--accent);
    color: var(--paper);
    position: relative;
  }
  .cat-btn.challenge .cat-no,
  .cat-btn.challenge .cat-count { color: var(--gold); }
  .cat-btn.challenge:hover { background: var(--accent-dark); }
  .cat-btn.challenge::after {
    content: "QUICK";
    position: absolute;
    top: 8px; right: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 11px;
    letter-spacing: 0.18em;
    background: var(--gold);
    color: var(--ink);
    padding: 1px 6px;
  }

  /* ---- Quiz screen ---- */
  .quiz-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 6px;
  }
  .q-cat {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    background: var(--ink);
    color: var(--paper);
    padding: 3px 9px;
  }
  .q-counter {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    line-height: 1;
  }
  .q-counter .total { color: #908a76; font-size: 18px; }

  .progress {
    height: 8px;
    background: var(--paper-dark);
    border: 1.5px solid var(--ink);
    margin: 10px 0 22px;
  }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0;
    transition: width 0.35s ease;
  }

  .question {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.55;
    margin-bottom: 6px;
  }
  .q-instruction {
    font-size: 12px;
    color: #6b6757;
    margin-bottom: 18px;
  }

  .choices { display: flex; flex-direction: column; gap: 10px; }
  .choice {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--paper-dark);
    border: 2px solid var(--ink);
    padding: 14px 14px;
    cursor: pointer;
    font-family: inherit;
    font-size: 15px;
    text-align: left;
    line-height: 1.5;
    transition: transform 0.1s, background 0.1s;
  }
  .choice:hover:not(:disabled) {
    transform: translateX(3px);
    background: var(--paper);
  }
  .choice:disabled { cursor: default; }
  .choice .num {
    flex-shrink: 0;
    width: 26px; height: 26px;
    background: var(--ink);
    color: var(--paper);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .choice.correct {
    background: var(--green);
    color: var(--paper);
    border-color: var(--ink);
  }
  .choice.correct .num { background: var(--gold); color: var(--ink); }
  .choice.wrong {
    background: var(--accent);
    color: var(--paper);
  }
  .choice.wrong .num { background: var(--accent-dark); }
  .choice.dim { opacity: 0.45; }

  .explain {
    margin-top: 18px;
    border: 2px solid var(--ink);
    background: var(--paper-dark);
    padding: 0;
    display: none;
  }
  .explain.show { display: block; animation: pop 0.25s ease; }
  @keyframes pop {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .explain-head {
    padding: 8px 14px;
    font-weight: 900;
    font-size: 14px;
    letter-spacing: 0.06em;
    color: var(--paper);
  }
  .explain-head.ok { background: var(--green); }
  .explain-head.ng { background: var(--accent); }
  .explain-body {
    padding: 14px;
    font-size: 14px;
    line-height: 1.65;
  }
  .explain-body .ans-label {
    font-weight: 700;
    color: var(--accent-dark);
  }

  .next-btn {
    margin-top: 18px;
    width: 100%;
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 16px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.08em;
    cursor: pointer;
    display: none;
    transition: background 0.12s;
  }
  .next-btn:hover { background: var(--accent); }
  .next-btn.show { display: block; }

  /* ---- Result screen ---- */
  .result-score {
    text-align: center;
    padding: 10px 0 4px;
  }
  .result-score .pct {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 88px;
    line-height: 0.9;
    color: var(--accent);
  }
  .result-score .frac {
    font-size: 16px;
    font-weight: 700;
    margin-top: 4px;
  }
  .result-msg {
    text-align: center;
    margin: 14px 0 22px;
    font-size: 15px;
    font-weight: 700;
    padding: 10px;
    border: 2px dashed var(--ink);
  }
  .review-title {
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 10px;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 4px;
  }
  .review-item {
    display: flex;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--line);
    font-size: 13px;
    line-height: 1.5;
  }
  .review-item .mark {
    flex-shrink: 0;
    width: 22px; height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 900;
    color: var(--paper);
  }
  .review-item .mark.o { background: var(--green); }
  .review-item .mark.x { background: var(--accent); }

  .btn-row { display: flex; gap: 10px; margin-top: 22px; }
  .btn-row button {
    flex: 1;
    border: 2px solid var(--ink);
    padding: 14px;
    font-family: inherit;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: transform 0.1s;
  }
  .btn-row button:hover { transform: translateY(-2px); }
  .btn-retry { background: var(--accent); color: var(--paper); }
  .btn-home { background: var(--paper-dark); color: var(--ink); }

  .hidden { display: none; }

  footer {
    margin-top: 36px;
    font-size: 11px;
    color: #8a8472;
    text-align: center;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="kicker">CONSTRUCTION MANAGEMENT EXAM</div>
    <h1><span class="lvl">2級</span>建築施工管理技士</h1>
    <div class="sub">学科対策 ／ 四肢択一トレーニング</div>
  </header>

  <!-- ===== START SCREEN ===== -->
  <section id="start" class="panel">
    <div class="start-title">出題分野をえらぶ</div>
    <div class="cat-grid" id="catGrid"></div>
  </section>

  <!-- ===== QUIZ SCREEN ===== -->
  <section id="quiz" class="panel hidden">
    <div class="quiz-head">
      <span class="q-cat" id="qCat">建築学</span>
      <span class="q-counter"><span id="qNow">1</span><span class="total" id="qTotal">/10</span></span>
    </div>
    <div class="progress"><div class="progress-bar" id="progBar"></div></div>

    <div class="question" id="qText">問題文</div>
    <div class="q-instruction">最も適当なもの（または不適当なもの）を1つ選びなさい。</div>

    <div class="choices" id="choices"></div>

    <div class="explain" id="explain">
      <div class="explain-head" id="explainHead">解説</div>
      <div class="explain-body" id="explainBody"></div>
    </div>

    <button class="next-btn" id="nextBtn">次の問題へ ▶</button>
  </section>

  <!-- ===== RESULT SCREEN ===== -->
  <section id="result" class="panel hidden">
    <div class="result-score">
      <div class="pct" id="resPct">80%</div>
      <div class="frac" id="resFrac">8 / 10 問正解</div>
    </div>
    <div class="result-msg" id="resMsg"></div>
    <div class="review-title">復習リスト</div>
    <div id="reviewList"></div>
    <div class="btn-row">
      <button class="btn-retry" id="btnRetry">もう一度</button>
      <button class="btn-home" id="btnHome">分野を選び直す</button>
    </div>
  </section>

  <footer>
    2級建築施工管理技士 学科試験対策アプリ<br>
    ※ 学習用の練習問題です。最新の試験基準は公式情報をご確認ください。
  </footer>

</div>

<script>
/* =========================================================
   問題データ
   各問: { c:分野, q:問題文, opts:[4択], a:正解index(0-3),
           neg:true=不適当なものを選ぶ問題, exp:解説 }
   ========================================================= */
const QUESTIONS = [
  /* ---------- 建築学 ---------- */
  {
    c:"建築学",
    q:"日照・日射に関する記述として、最も不適当なものはどれか。",
    opts:[
      "夏至の日の日照時間は、南面より水平面のほうが長い。",
      "北緯35度付近では、夏至の日の南面の終日日射量は水平面より小さい。",
      "夏至の日の終日日射量は、東面・西面より南面のほうが大きい。",
      "冬至の日の終日日射量は、南面が最も大きい。"
    ],
    a:2, neg:true,
    exp:"夏至は太陽高度が高いため、南面の終日日射量は東面・西面より小さくなります。南面の日射量が最大になるのは太陽高度の低い冬至。よって③が不適当です。"
  },
  {
    c:"建築学",
    q:"色彩に関する記述として、最も不適当なものはどれか。",
    opts:[
      "明度は色の明るさの度合いを表す。",
      "純色とは、各色相のなかで最も彩度の高い色をいう。",
      "同じ色でも面積が大きいほど明るく、あざやかに見える（面積効果）。",
      "暖色は寒色に比べて後退して見える。"
    ],
    a:3, neg:true,
    exp:"暖色（赤・橙など）は前進・膨張して見え、寒色（青など）は後退・収縮して見えます。記述が逆なので④が不適当です。"
  },
  {
    c:"建築学",
    q:"換気に関する記述として、最も適当なものはどれか。",
    opts:[
      "室内外の温度差による自然換気では、温度差が大きいほど換気量は減少する。",
      "風力による自然換気では、換気量は風速に比例する。",
      "第3種機械換気は、給気・排気ともに送風機で行う方式である。",
      "全般換気とは、汚染源の近くで局所的に行う換気をいう。"
    ],
    a:1, neg:false,
    exp:"風力換気の換気量は風速に比例します。①温度差が大きいほど換気量は増加。③第3種は排気のみ機械、給気は自然。④局所的なのは局所換気で、全般換気は室全体が対象です。"
  },
  {
    c:"建築学",
    q:"鉄筋コンクリート構造に関する記述として、最も不適当なものはどれか。",
    opts:[
      "コンクリートは圧縮力に強く、鉄筋は引張力に強い。",
      "鉄筋とコンクリートは線膨張係数がほぼ等しい。",
      "コンクリートのアルカリ性は、鉄筋の発錆を促進する。",
      "柱の主筋は、4本以上とする。"
    ],
    a:2, neg:true,
    exp:"コンクリートのアルカリ性は鉄筋表面に不動態被膜をつくり、発錆を抑制します。中性化が進むとこの保護効果が失われます。よって③が不適当です。"
  },
  {
    c:"建築学",
    q:"建築材料としての木材に関する記述として、最も不適当なものはどれか。",
    opts:[
      "含水率が繊維飽和点以下では、含水率の減少に伴い強度が増加する。",
      "辺材は心材に比べて一般に腐朽しにくい。",
      "木材の強度は、繊維方向と荷重方向の角度により異なる。",
      "年輪は、密度の高い晩材と密度の低い早材で構成される。"
    ],
    a:1, neg:true,
    exp:"心材（赤身）は樹脂分が多く耐久性が高いのに対し、辺材（白太）は腐朽しやすい部分です。記述が逆なので②が不適当です。"
  },

  /* ---------- 共通（設備・契約等） ---------- */
  {
    c:"共通",
    q:"建築設備に関する記述として、最も不適当なものはどれか。",
    opts:[
      "給水方式のうち、高置水槽方式は受水槽の水をポンプで屋上水槽へ揚水する。",
      "排水トラップは、排水管からの臭気や害虫の侵入を防ぐ。",
      "LEDランプは、白熱電球に比べて消費電力が大きい。",
      "避雷設備は、高さ20mを超える建築物に原則として設ける。"
    ],
    a:2, neg:true,
    exp:"LEDランプは白熱電球に比べ消費電力が小さく、長寿命です。記述が逆なので③が不適当です。"
  },
  {
    c:"共通",
    q:"測量に関する記述として、最も適当なものはどれか。",
    opts:[
      "水準測量は、2点間の高低差を求める測量である。",
      "トラバース測量は、地面の温度を測定する測量である。",
      "平板測量は、夜間にのみ行う測量である。",
      "三角測量では、距離は一切測定しない。"
    ],
    a:0, neg:false,
    exp:"水準測量（レベル測量）はレベルと標尺を用いて2点間の高低差を求める測量です。②トラバース測量は多角測量、④三角測量も基線の距離測定を行います。"
  },

  /* ---------- 施工（躯体） ---------- */
  {
    c:"施工（躯体）",
    q:"地盤調査に関する記述として、最も不適当なものはどれか。",
    opts:[
      "標準貫入試験は、N値により地盤の硬軟・締まり具合を判定する。",
      "標準貫入試験のN値は、ハンマーの落下回数で表される。",
      "ボーリングにより、土の試料を採取することができる。",
      "平板載荷試験は、地盤の支持力を調べる試験である。"
    ],
    a:1, neg:true,
    exp:"標準貫入試験のN値は、サンプラーを30cm打ち込むのに要する打撃回数で表されます。ハンマー（質量63.5kg）の落下高さは76cmで一定。よって②が不適当です。"
  },
  {
    c:"施工（躯体）",
    q:"鉄筋工事に関する記述として、最も不適当なものはどれか。",
    opts:[
      "鉄筋のかぶり厚さは、火災時の鉄筋の保護や耐久性の確保のために設ける。",
      "鉄筋の継手位置は、応力の小さい箇所に設けるのが望ましい。",
      "ガス圧接継手の圧接部のふくらみの直径は、鉄筋径の1.4倍以上とする。",
      "D32の鉄筋とD22の鉄筋は、ガス圧接継手で接合してよい。"
    ],
    a:3, neg:true,
    exp:"ガス圧接継手は、原則として径の差が7mmを超える異径鉄筋同士の圧接はできません。D32とD22は径差が10mmあり不可。よって④が不適当です。"
  },
  {
    c:"施工（躯体）",
    q:"コンクリート工事に関する記述として、最も不適当なものはどれか。",
    opts:[
      "スランプが大きいほど、コンクリートの流動性は高くなる。",
      "コンクリートの打込み後、適切な養生で乾燥や急激な温度変化を防ぐ。",
      "コンクリートの打重ね時間が長すぎると、コールドジョイントが生じやすい。",
      "水セメント比を大きくすると、コンクリートの圧縮強度は高くなる。"
    ],
    a:3, neg:true,
    exp:"水セメント比を大きくする（水の割合を増やす）と、コンクリートの圧縮強度は低下し、耐久性も劣ります。よって④が不適当です。"
  },
  {
    c:"施工（躯体）",
    q:"型枠工事に関する記述として、最も不適当なものはどれか。",
    opts:[
      "型枠は、コンクリートの自重や打込み時の側圧に耐える強度が必要である。",
      "支保工は、上下階の支柱を平面上なるべく同一位置に設ける。",
      "型枠の存置期間は、コンクリートの強度に関係なく一律に定められている。",
      "せき板に作用する側圧は、コンクリートの打込み速度が速いほど大きくなる。"

const CATS = ["建築学","共通","施工（躯体）","施工（仕上げ）","施工管理法","法規"];
let pool = [], idx = 0, score = 0, answered = false, results = [];

const $ = id => document.getElementById(id);

/* ---- スタート画面の分野ボタン生成 ---- */
function buildStart(){
  const grid = $("catGrid");
  grid.innerHTML = "";

  // 10問チャレンジ(目立つので最上部)
  const ch = document.createElement("button");
  ch.className = "cat-btn challenge";
  ch.innerHTML = `<div class="cat-no">10</div>
                  <div class="cat-name">10問チャレンジ</div>
                  <div class="cat-count">全分野からランダム10問・腕試しに最適</div>`;
  ch.onclick = ()=>startQuiz("CHALLENGE");
  grid.appendChild(ch);

  CATS.forEach((cat,i)=>{
    const n = QUESTIONS.filter(q=>q.c===cat).length;
    const b = document.createElement("button");
    b.className = "cat-btn";
    b.innerHTML = `<div class="cat-no">${String(i+1).padStart(2,"0")}</div>
                   <div class="cat-name">${cat}</div>
                   <div class="cat-count">${n}問</div>`;
    b.onclick = ()=>startQuiz(cat);
    grid.appendChild(b);
  });
  const all = document.createElement("button");
  all.className = "cat-btn all";
  all.innerHTML = `<div class="cat-no">★</div>
                   <div class="cat-name">全分野まとめて挑戦</div>
                   <div class="cat-count">${QUESTIONS.length}問・シャッフル出題</div>`;
  all.onclick = ()=>startQuiz("ALL");
  grid.appendChild(all);
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

/* ---- クイズ開始 ---- */
function startQuiz(cat){
  if(cat==="CHALLENGE"){
    pool = shuffle([...QUESTIONS]).slice(0,10);
  } else if(cat==="ALL"){
    pool = shuffle([...QUESTIONS]);
  } else {
    pool = shuffle(QUESTIONS.filter(q=>q.c===cat));
  }
  idx = 0; score = 0; results = [];
  $("start").classList.add("hidden");
  $("result").classList.add("hidden");
  $("quiz").classList.remove("hidden");
  $("qTotal").textContent = "/"+pool.length;
  renderQuestion();
}

/* ---- 問題表示 ---- */
function renderQuestion(){
  answered = false;
  const q = pool[idx];
  $("qCat").textContent = q.c;
  $("qNow").textContent = idx+1;
  $("qText").textContent = q.q;
  document.querySelector(".q-instruction").textContent =
    q.neg ? "最も不適当なものを1つ選びなさい。" : "最も適当なものを1つ選びなさい。";
  $("progBar").style.width = (idx/pool.length*100)+"%";

  const cont = $("choices");
  cont.innerHTML = "";
  q.opts.forEach((opt,i)=>{
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.innerHTML = `<span class="num">${i+1}</span><span>${opt}</span>`;
    btn.onclick = ()=>selectAnswer(i);
    cont.appendChild(btn);
  });

  $("explain").classList.remove("show");
  $("nextBtn").classList.remove("show");
}

/* ---- 解答処理 ---- */
function selectAnswer(sel){
  if(answered) return;
  answered = true;
  const q = pool[idx];
  const btns = document.querySelectorAll(".choice");
  const correct = sel===q.a;
  if(correct) score++;
  results.push({q:q.q, cat:q.c, correct, picked:sel, ans:q.a});

  btns.forEach((b,i)=>{
    b.disabled = true;
    if(i===q.a) b.classList.add("correct");
    else if(i===sel) b.classList.add("wrong");
    else b.classList.add("dim");
  });

  const head = $("explainHead");
  head.textContent = correct ? "◯ 正解" : "✕ 不正解";
  head.className = "explain-head " + (correct ? "ok" : "ng");
  $("explainBody").innerHTML =
    `<span class="ans-label">正解：${q.a+1}番</span><br>${q.exp}`;
  $("explain").classList.add("show");

  $("nextBtn").textContent = (idx===pool.length-1) ? "結果を見る ▶" : "次の問題へ ▶";
  $("nextBtn").classList.add("show");
  $("progBar").style.width = ((idx+1)/pool.length*100)+"%";
}

/* ---- 次へ ---- */
$("nextBtn").onclick = ()=>{
  if(idx < pool.length-1){
    idx++;
    renderQuestion();
    window.scrollTo({top:0,behavior:"smooth"});
  } else {
    showResult();
  }
};

/* ---- 結果表示 ---- */
function showResult(){
  $("quiz").classList.add("hidden");
  $("result").classList.remove("hidden");
  const pct = Math.round(score/pool.length*100);
  $("resPct").textContent = pct+"%";
  $("resFrac").textContent = `${score} / ${pool.length} 問正解`;

  let msg;
  if(pct>=80) msg = "合格ライン突破！この調子で本番も得点を狙えます。";
  else if(pct>=60) msg = "あと一歩。間違えた分野を重点的に復習しましょう。";
  else msg = "基礎固めが必要です。解説を読み込んで再挑戦を。";
  $("resMsg").textContent = msg;

  const list = $("reviewList");
  list.innerHTML = "";
  results.forEach((r,i)=>{
    const item = document.createElement("div");
    item.className = "review-item";
    item.innerHTML =
      `<span class="mark ${r.correct?'o':'x'}">${r.correct?'◯':'✕'}</span>
       <span><strong>[${r.cat}]</strong> ${r.q}</span>`;
    list.appendChild(item);
  });
  window.scrollTo({top:0,behavior:"smooth"});
}

$("btnRetry").onclick = ()=>{
  pool = shuffle(pool);
  idx = 0; score = 0; results = [];
  $("result").classList.add("hidden");
  $("quiz").classList.remove("hidden");
  renderQuestion();
  window.scrollTo({top:0,behavior:"smooth"});
};
$("btnHome").onclick = ()=>{
  $("result").classList.add("hidden");
  $("start").classList.remove("hidden");
  window.scrollTo({top:0,behavior:"smooth"});
};

buildStart();
</script>
</body>
</html>
